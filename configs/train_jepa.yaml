# Defaults for scripts/train_jepa.py.
# CLI flags override these; these override script-level defaults.

cache_dir: /scratch/cr4206/sEMGencoderJEPA/data
output_directory: /scratch/cr4206/sEMGencoderJEPA/runs/jepa_pretrain

epochs: 100
max_batch_len: 88000              # matches Gaddy/baseline: 128000 @ 1000 Hz == ~88000 @ 689 Hz
fixed_raw_len: 1600
grad_accum_steps: 2               # effective batch ~176k; helps stabilize var/cov regs

learning_rate: 3.0e-4
learning_rate_warmup: 1000        # linear warmup, then cosine decay over remainder
min_learning_rate: 0.0
weight_decay: 1.0e-4

# Cosine EMA momentum schedule: 0.996 -> 0.9999 over training
ema_momentum_base: 0.996
ema_momentum_final: 0.9999

# Loss weights (VICReg defaults). inv = invariance (smooth-L1 between LayerNorm'd
# student-pred and teacher-target), var = variance hinge on student features,
# cov = off-diagonal covariance penalty on student features.
inv_weight: 25.0
var_weight: 25.0
cov_weight: 1.0
var_target_std: 1.0

proj_dim: 256
model_size: 768
num_layers: 6
dropout: 0.2

wandb: false
wandb_entity: UMLforVideoLab
wandb_project: JEPAforsEMG
wandb_run_name: null
wandb_tags: []
